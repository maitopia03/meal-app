<!DOCTYPE html>
<html lang="vi">
<head>
<title>Meal Planner</title>
<!-- ===== iOS PWA SETTINGS ===== -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meal Planner">
<meta name="theme-color" content="#ffe6f2">

<!-- iPhone icon -->
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAMAAAADACAYAAABS3GwHAAA...">
<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>
<rect width='200' height='200' rx='40' fill='%23ffe6f2'/>
<text x='50%' y='54%' text-anchor='middle' font-size='90'>🍱</text>
</svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planner</title>
<link href="https://fonts.cdnfonts.com/css/the-untold-story" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box}

body{
  font-family:'The Untold Story', Calibri, sans-serif;
  background:#cfe8ff;
  margin:0;
  padding:12px;
}

/* container full width mobile */
.container{
  width:100%;
  max-width:900px;
  margin:auto;
  background:#ffe6f2;
  padding:18px;
  border-radius:22px;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

h1{
  font-size:26px;
  margin-top:6px;
}

h2{
  font-size:20px;
}

section{margin-top:22px}

/* input full width mobile */
input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #aaa;
  width:100%;
  margin-bottom:8px;
  font-size:16px;
}

/* ===== BABY BLUE PILL BUTTON ===== */

button{
  border:none;
  cursor:pointer;
  font-family:'The Untold Story', Calibri, sans-serif;
  font-size:16px;
  padding:12px 18px;
  border-radius:999px;
  background:#9ed0ff;
  color:black;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  transition:.25s;
}

button:hover{
  background:#86c5ff;
  transform:translateY(-1px);
}

button:active{
  transform:scale(.97);
}

.randBtn,.addBtn{
  width:100%;
  margin-top:6px;
}

@media (min-width:768px){
  .randBtn,.addBtn{width:auto}
}

/* small action buttons */
.editBtn,.delBtn{
  padding:2px 6px;
  font-size:11px;
  border-radius:7px;
  white-space:nowrap;
}
.editBtn{background:#8ecbff;color:#fff}
.delBtn{background:#ff6b6b;color:#fff}

.meal{
  text-align:center;
  font-size:22px;
  margin-top:14px;
  line-height:1.4;
}

/* MOBILE: 1 column */
.col3{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.card{
  background:#fff5fb;
  padding:14px;
  border-radius:16px;
}

ul{padding-left:18px}

li{
  margin:6px 0;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:nowrap;
  font-size:15px;
}

/* DESKTOP AUTO SWITCH */
@media (min-width:768px){
  .col3{grid-template-columns:1fr 1fr 1fr}
  .randBtn,.addBtn{width:auto}
}
</style>
</head>
<body>
<div class="container">
<h1>🍱 Meal Planner</h1>

<section>
<h2>1️⃣ Hôm nay ăn gì?</h2>
<button class="randBtn" onclick="randomMeal()">🎲 Đoán xem <3</button>
<div class="meal" id="meal"></div>
</section>

<section>
<h2>2️⃣ Để thực đơn thêm đa dạng</h2>
<input id="foodName" placeholder="Tên món">
<select id="foodGroup">
<option value="carb">Tinh bột</option>
<option value="veggie">Chất xơ & Vitamin</option>
<option value="protein">Chất đạm</option>
</select>
<button class="addBtn" onclick="addFood()">Thêm món</button>
<br><br>
<button class="randBtn" onclick="exportExcel()">📥 Xuất Excel</button>
<button class="randBtn" onclick="importExcel()">📤 Nhập Excel</button>
<input type="file" id="fileInput" accept=".xlsx" hidden>
</section>

<section>
<h2>3️⃣ Thiên đường ẩm thực của công chúa</h2>
<div class="col3">
<div class="card"><h3>Tinh bột</h3><ul id="carbList"></ul></div>
<div class="card"><h3>Chất xơ & Vitamin</h3><ul id="vegList"></ul></div>
<div class="card"><h3>Chất đạm</h3><ul id="proList"></ul></div>
</div>
</section>
</div>

<script>
const foodName=document.getElementById('foodName');
const foodGroup=document.getElementById('foodGroup');
const meal=document.getElementById('meal');
const carbList=document.getElementById('carbList');
const vegList=document.getElementById('vegList');
const proList=document.getElementById('proList');

let foods=JSON.parse(localStorage.getItem('foods'))||[
{name:'Cơm',group:'carb'},
{name:'Khoai luộc',group:'carb'},
{name:'Rau muống xào',group:'veggie'},
{name:'Canh bí',group:'veggie'},
{name:'Thịt luộc',group:'protein'},
{name:'Cá chiên',group:'protein'}];

function save(){localStorage.setItem('foods',JSON.stringify(foods))}
function sortFoods(){foods.sort((a,b)=>a.name.localeCompare(b.name,'vi'))}

function render(){
 sortFoods();
 carbList.innerHTML='';vegList.innerHTML='';proList.innerHTML='';
 foods.forEach((f,i)=>{
  const li=`<li>${f.name} <button class='editBtn' onclick='editFood(${i})'>✏️</button> <button class='delBtn' onclick='deleteFood(${i})'>x</button></li>`;
  if(f.group=='carb') carbList.innerHTML+=li;
  if(f.group=='veggie') vegList.innerHTML+=li;
  if(f.group=='protein') proList.innerHTML+=li;
 });
 save();
}

function addFood(){
 const name=foodName.value.trim();
 const group=foodGroup.value;
 if(!name){alert('Nhập tên món');return}
 foods.push({name,group});
 foodName.value='';
 render();
}
function deleteFood(i){foods.splice(i,1);render()}
function editFood(i){const n=prompt('Sửa tên món',foods[i].name); if(n){foods[i].name=n;render()}}
function randomFrom(g){const arr=foods.filter(f=>f.group==g); if(arr.length==0) return 'Chưa có'; return arr[Math.floor(Math.random()*arr.length)].name}
function randomMeal(){meal.innerText=`🥩 ${randomFrom('protein')} | 🥦 ${randomFrom('veggie')} | 🍚 ${randomFrom('carb')}`}

render();
// ===== EXPORT DATA =====
function exportData(){
 const data = JSON.stringify(foods);
 const blob = new Blob([data], {type:"application/json"});
 const a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "meal-data.json";
 a.click();
}

// ===== IMPORT DATA =====
function importData(){
 document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e){
 const file = e.target.files[0];
 if(!file) return;
 const reader = new FileReader();
 reader.onload = function(){
   foods = JSON.parse(reader.result);
   save();
   render();
   alert("Đã khôi phục dữ liệu 🎉");
 };
 reader.readAsText(file);
});
// ===== EXPORT EXCEL =====
function exportExcel(){

  const data = foods.map(f => ({
    "Tên món": f.name,
    "Nhóm": f.group
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Meals");

  XLSX.writeFile(wb, "Meal_Data.xlsx");
}


// ===== IMPORT EXCEL =====
function importExcel(){
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(evt){
    const data = new Uint8Array(evt.target.result);
    const workbook = XLSX.read(data, {type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet);

    foods = rows.map(r => ({
      name: r["Tên món"],
      group: r["Nhóm"]
    }));

    save();
    render();
    alert("Đã nhập dữ liệu từ Excel 🎉");
  };

  reader.readAsArrayBuffer(file);
});
// PWA standalone detect
if (window.navigator.standalone === true) {
  document.body.style.paddingTop = "10px";
}
</script>
</body>
</html>
